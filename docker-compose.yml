services:
  kindle-sync-command-center:
    build: .
    image: kindle-sync-command-center:latest
    container_name: kindle-sync-command-center
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Persist catalog JSON + downloaded binaries on the volume below (overrides paths derived from KOMGA_SOURCE_DIR).
      KOMGA_LIBRARY_DB_PATH: /data/komga/komga_library_snapshot.json
      KOMGA_BINARIES_DIR: /data/komga/komga_library_files
      APP_LOG_FILE: /data/komga/app.log
    volumes:
      - komga_catalog_data:/data/komga

  komga-library-cron:
    image: alpine:3.20
    container_name: komga-library-cron
    restart: unless-stopped
    depends_on:
      - kindle-sync-command-center
    environment:
      KOMGA_LIBRARY_CRON_SCHEDULE: ${KOMGA_LIBRARY_CRON_SCHEDULE:-0 */6 * * *}
    command: >
      sh -c "apk add --no-cache curl &&
      echo \"$${KOMGA_LIBRARY_CRON_SCHEDULE} curl -fsS -X POST http://kindle-sync-command-center:8080/komga/library/refresh >/proc/1/fd/1 2>/proc/1/fd/2\" > /etc/crontabs/root &&
      crond -f -l 8"

volumes:
  komga_catalog_data:
