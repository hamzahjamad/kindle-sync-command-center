<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kindle Sync Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-100">
    <main class="mx-auto max-w-2xl p-6">
      <div class="rounded-2xl bg-slate-800 p-6 shadow-xl">
        <h1 class="text-2xl font-bold">Kindle Sync Command Center</h1>
        <p class="mt-2 text-sm text-slate-300">
          Trigger sync and monitor Kindle health from one page.
        </p>

        <div class="mt-6 flex items-center gap-3">
          <button
            id="syncBtn"
            class="rounded-xl bg-emerald-500 px-4 py-2 font-semibold text-slate-900 transition hover:bg-emerald-400"
          >
            Sync Now
          </button>
          <span id="syncResponse" class="text-sm text-slate-300"></span>
        </div>

        <div class="mt-8">
          <h2 class="text-lg font-semibold">Storage</h2>
          <div class="mt-3 h-4 w-full rounded-full bg-slate-700">
            <div id="storageBar" class="h-4 rounded-full bg-cyan-400" style="width: 0%"></div>
          </div>
          <p id="storageText" class="mt-2 text-sm text-slate-300">No data yet.</p>
        </div>

        <div class="mt-8 grid gap-2 text-sm">
          <p><span class="font-semibold">Status:</span> <span id="status">Unknown</span></p>
          <p><span class="font-semibold">Last Run:</span> <span id="lastRun">-</span></p>
          <p><span class="font-semibold">Message:</span> <span id="message">-</span></p>
        </div>

        <div class="mt-8">
          <h2 class="text-lg font-semibold">Recent Logs</h2>
          <pre
            id="logs"
            class="mt-3 max-h-80 overflow-auto rounded-lg bg-slate-900 p-3 text-xs text-slate-300"
          ></pre>
        </div>
      </div>
    </main>

    <script>
      const maxStorageForBar = 8; // Adjust this to your Kindle capacity in GB.

      async function refreshStatus() {
        const res = await fetch("/status");
        const data = await res.json();

        document.getElementById("status").textContent = data.in_progress
          ? `${data.status} (Running...)`
          : data.status;
        document.getElementById("lastRun").textContent = data.last_run || "-";
        document.getElementById("message").textContent = data.message || "-";

        if (data.remaining_storage_gb !== null && data.remaining_storage_gb !== undefined) {
          const pct = Math.max(0, Math.min(100, (data.remaining_storage_gb / maxStorageForBar) * 100));
          document.getElementById("storageBar").style.width = `${pct}%`;
          document.getElementById("storageText").textContent =
            `${data.remaining_storage_gb} GB remaining`;
        }
      }

      async function refreshLogs() {
        const res = await fetch("/logs");
        const data = await res.json();
        document.getElementById("logs").textContent = (data.lines || []).join("\n");
      }

      document.getElementById("syncBtn").addEventListener("click", async () => {
        const res = await fetch("/sync", { method: "POST" });
        const data = await res.json();
        document.getElementById("syncResponse").textContent = `Response: ${data.status}`;
        await refreshStatus();
      });

      async function tick() {
        await Promise.all([refreshStatus(), refreshLogs()]);
      }

      tick();
      setInterval(tick, 5000);
    </script>
  </body>
</html>
